<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포켓몬 실루엣 퀴즈</title>
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">POKEMON SILHOUETTE QUIZ</p>
      <h1>실루엣만 보고 포켓몬 이름 맞히기</h1>
      <p class="intro">
        한 게임에 30문제가 출제됩니다. 포켓몬 이름을 한국어 또는 영어로 입력하면 정답 여부를 바로 판정합니다.
      </p>
    </section>

    <section class="quiz-card" aria-live="polite">
      <div class="quiz-top">
        <div>
          <p class="label">진행도</p>
          <p id="progressText" class="value">1 / 30</p>
        </div>
        <div>
          <p class="label">점수</p>
          <p id="scoreText" class="value">0점</p>
        </div>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div class="silhouette-stage">
        <div class="image-shell">
          <img id="pokemonImage" class="pokemon-image is-silhouette" alt="포켓몬 실루엣" />
        </div>
      </div>

      <div class="question-meta">
        <p id="questionLabel" class="question-label">문제 1</p>
        <p class="hint">띄어쓰기 없이 입력해도 판정됩니다.</p>
      </div>

      <form id="answerForm" class="answer-form">
        <label class="sr-only" for="answerInput">포켓몬 이름 입력</label>
        <input
          id="answerInput"
          name="answer"
          type="text"
          autocomplete="off"
          placeholder="예: 피카츄 / pikachu"
          required
        />
        <button id="submitButton" type="submit">정답 확인</button>
      </form>

      <p id="feedbackMessage" class="feedback neutral">이름을 입력하고 정답 확인을 눌러 주세요.</p>

      <div class="answer-actions">
        <button id="nextButton" class="secondary-button is-hidden" type="button">다음 문제</button>
        <button id="restartButton" class="secondary-button is-hidden" type="button">다시 하기</button>
      </div>

      <section class="result-panel">
        <p class="label">이번 문제 정답</p>
        <p id="answerReveal" class="answer-reveal">???</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
